# === 커스텀 채팅 UI (포트 3000) ===
server {
    listen 3000;
    root /usr/share/nginx/custom-ui;
    index index.html;

    location /api/automap {
        proxy_pass http://172.18.0.1:18799/automap;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 120s;
    }

    location /api/sync {
        proxy_pass http://172.18.0.1:18799/sync;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 30s;
    }

    location /api/integrations/ {
        proxy_pass http://172.18.0.1:18799/api/integrations/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/dooray/ {
        proxy_pass http://172.18.0.1:18799/api/dooray/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/file/ {
        proxy_pass http://172.18.0.1:18799/api/file/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/vnc/ {
        proxy_pass http://172.18.0.1:18799/api/vnc/;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# === claw.tideflo.work (Google OAuth2 + Custom UI) ===
server {
    listen 80;
    server_name claw.tideflo.work;
    client_max_body_size 50m;
    root /usr/share/nginx/custom-ui;
    index index.html;

    # OAuth2 routes
    location /oauth/ {
        proxy_pass http://172.18.0.1:18799;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /auth/ {
        proxy_pass http://172.18.0.1:18799;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 10s;
    }

    # API routes
    location /api/automap {
        proxy_pass http://172.18.0.1:18799/automap;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 120s;
    }

    location /api/sync {
        proxy_pass http://172.18.0.1:18799/sync;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 30s;
    }

    # Admin API routes
    location /api/admin/ {
        proxy_pass http://172.18.0.1:18799/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Mail API routes
    # File upload API
    location /api/file/ {
        proxy_pass http://172.18.0.1:18799/api/file/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }

    # Drive upload API
    location /api/drive/upload {
        proxy_pass http://172.18.0.1:18799/api/drive/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }

    location /api/mail/ {
        proxy_pass http://172.18.0.1:18799/api/mail/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Integrations API (Dooray, GitHub token save/load)
    location /api/integrations/ {
        proxy_pass http://172.18.0.1:18799/api/integrations/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Dooray API
    location /api/dooray/ {
        proxy_pass http://172.18.0.1:18799/api/dooray/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # VNC control API
    location /api/vnc/ {
        proxy_pass http://172.18.0.1:18799/api/vnc/;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Gateway WebSocket proxy (dynamic based on cookie)
    location /ws {
        # JS will connect to the right port directly
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}


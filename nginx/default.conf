map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 18001;

    location = /auto-login {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><script>window.location.replace("/?token=tc-user01")</script></head><body></body></html>';
    }

    location /api/automap {
        proxy_pass http://172.18.0.1:18799/automap;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://user01:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        sub_filter 'token:"",sessionKey' 'token:"tc-user01",sessionKey';
        sub_filter_once on;
        sub_filter_types *;
    }
}


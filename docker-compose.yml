        OPENCLAW_INSTALL_BROWSER: "1"
    container_name: openclaw-user15
    networks:
      default:
        ipv4_address: 172.18.0.25
    expose:
      - "18789"
      - "6080"
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - TZ=Asia/Seoul
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=tc-user15
      - DISPLAY=:99
      - PLAYWRIGHT_BROWSERS_PATH=/home/node/.cache/ms-playwright
    volumes:
      - /opt/openclaw/data/user15:/home/node/.openclaw
      - /opt/openclaw/shared/user15:/home/node/documents
      - /opt/openclaw/bootstrap/BOOTSTRAP.md:/home/node/BOOTSTRAP.md:ro
      - /opt/openclaw/scripts/bin:/opt/scripts:ro
      - /opt/openclaw/scripts/bin/dooray:/usr/local/bin/dooray:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3g
        reservations:
          memory: 1.5g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
